<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Pixelated Text Playground</title>
<style>
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Regular.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Ultralight.otf") format("opentype");
    font-weight: 200;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Italic.otf") format("opentype");
    font-weight: 400;
    font-style: italic;
    font-display: block;
  }
  @import url("https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;500;600;700;800&display=swap");

  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --panel-border: rgba(255,255,255,0.08);
    --text: #FAF8F5;
    --text-dim: rgba(250,248,245,0.55);
    --text-dimmer: rgba(250,248,245,0.35);
    --accent: #9B4DAF;
    --accent-hover: #C77DDB;
    --terracotta: #C45D35;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Funnel Sans", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  * { box-sizing: border-box; }

  /* ── Layout ─────────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: 100vh;
    gap: 0;
  }
  @media (max-width: 960px) {
    .app { grid-template-columns: 1fr; }
    .panel { border-left: none; border-top: 1px solid var(--panel-border); }
  }

  /* ── Stage (canvas side) ────────────────────────────────────── */
  .stage {
    position: relative;
    min-height: 480px;
    display: flex;
    flex-direction: column;
    padding: 32px 40px 24px 40px;
  }
  .stage-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .stage-title {
    font-family: "PP Editorial New", serif;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: -0.015em;
    color: var(--text);
    margin: 0;
  }
  .stage-meta {
    font-size: 12px;
    color: var(--text-dimmer);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .stage-meta strong { color: var(--text-dim); font-weight: 500; }

  .canvas-frame {
    flex: 1;
    position: relative;
    background: #000;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 420px;
  }

  .canvas-inner {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas.pixel-canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
  }

  /* Subtle scan-line overlay to reinforce the pixel aesthetic. */
  .canvas-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
    mix-blend-mode: multiply;
  }

  .stage-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    align-items: center;
  }

  .btn {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.14);
    padding: 10px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.01em;
    border-radius: 8px;
    cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
  }
  .btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.25); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: currentColor;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    opacity: 0.7;
  }

  .progress-rail {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    margin: 0 4px;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
    width: 0%;
    transition: width 80ms linear;
  }

  /* ── Panel (controls side) ──────────────────────────────────── */
  .panel {
    background: var(--panel);
    border-left: 1px solid var(--panel-border);
    padding: 32px 28px 40px 28px;
    overflow-y: auto;
    max-height: 100vh;
    position: sticky;
    top: 0;
  }
  .panel-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .panel-brand-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 2px;
  }
  .panel-brand-name {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
  }
  .panel-title {
    font-family: "PP Editorial New", serif;
    font-weight: 400;
    font-size: 28px;
    letter-spacing: -0.025em;
    margin: 0 0 8px 0;
    color: var(--text);
  }
  .panel-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    margin: 0 0 28px 0;
  }

  .section {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--panel-border);
  }
  .section:last-child { border-bottom: none; margin-bottom: 0; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .field {
    margin-bottom: 16px;
  }
  .field:last-child { margin-bottom: 0; }
  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .field-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }
  .field-value {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  textarea.text-input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    font-family: "PP Editorial New", serif;
    font-size: 20px;
    letter-spacing: -0.015em;
    padding: 12px 14px;
    border-radius: 6px;
    resize: vertical;
    min-height: 64px;
    line-height: 1.2;
    transition: border-color 140ms ease;
  }
  textarea.text-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--panel);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
    transition: transform 120ms ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--panel);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
  }

  .select-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .select-chip {
    padding: 7px 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 140ms ease;
    white-space: nowrap;
  }
  .select-chip:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
  .select-chip.active {
    background: rgba(155,77,175,0.15);
    border-color: var(--accent);
    color: var(--text);
  }

  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.16);
    cursor: pointer;
    transition: transform 120ms ease, border-color 140ms ease;
  }
  .color-swatch:hover { transform: scale(1.08); }
  .color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 28px; height: 28px;
    padding: 0;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

  .easing-select {
    background: #0a0a0a;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 6px;
    width: 100%;
    cursor: pointer;
  }
  .easing-select:focus { outline: none; border-color: var(--accent); }

  .footer-note {
    font-size: 11px;
    color: var(--text-dimmer);
    line-height: 1.5;
    margin-top: 24px;
  }

  /* ── Export modal ──────────────────────────────────────────── */
  .modal-scrim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 160ms ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal {
    width: 100%;
    max-width: 920px;
    max-height: min(680px, 90vh);
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    display: grid;
    grid-template-columns: 180px 1fr;
    overflow: hidden;
  }
  .modal-tabs {
    background: #0d0d0d;
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 28px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .modal-tab {
    padding: 12px 16px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 18px;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    border-radius: 8px;
    transition: all 140ms ease;
    letter-spacing: -0.005em;
  }
  .modal-tab:hover { color: var(--text); }
  .modal-tab.active {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(155,77,175,0.08);
  }
  .modal-body {
    padding: 32px 36px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .export-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .export-row:last-of-type { border-bottom: none; }
  .export-label {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 400;
  }
  .export-control {
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .seg {
    display: inline-flex;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .seg-btn {
    padding: 8px 18px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: all 140ms ease;
  }
  .seg-btn.active { background: rgba(255,255,255,0.08); color: var(--text); }
  .select-native {
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    min-width: 220px;
    cursor: pointer;
  }
  .select-native:focus { outline: none; border-color: var(--accent); }
  .toggle {
    width: 44px; height: 24px;
    background: #222;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    position: relative;
    transition: background 160ms ease;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #666;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: all 160ms ease;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { background: #fff; left: 23px; }

  .big-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    margin-top: 24px;
    transition: background 140ms ease;
  }
  .big-btn:hover { background: var(--accent-hover); }
  .big-btn:disabled { background: #333; color: var(--text-dim); cursor: not-allowed; }

  .code-block {
    background: #060606;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: #d8d4cf;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.55;
    max-height: 280px;
    overflow: auto;
  }

  .copy-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .secondary-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .secondary-btn:hover { background: rgba(255,255,255,0.06); }

  .modal-title {
    font-family: "PP Editorial New", serif;
    font-weight: 400;
    font-size: 22px;
    margin: 0 0 4px 0;
  }
  .modal-sub {
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 20px 0;
    line-height: 1.5;
  }

  .recording-pulse {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--terracotta);
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* "Export" button in the stage header */
  .export-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border-radius: 7px;
    cursor: pointer;
    transition: background 140ms ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .export-btn:hover { background: var(--accent-hover); }
  .export-btn svg { width: 13px; height: 13px; }
</style>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel">

// ─────────────────────────────────────────────────────────────────────────────
// Easing library (subset — what the UI exposes)
// ─────────────────────────────────────────────────────────────────────────────
const EASINGS = {
  linear:        (t) => t,
  easeOutQuad:   (t) => t * (2 - t),
  easeOutCubic:  (t) => (--t) * t * t + 1,
  easeOutQuart:  (t) => 1 - (--t) * t * t * t,
  easeOutExpo:   (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutCubic:(t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeOutBack:   (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
};
const EASING_NAMES = Object.keys(EASINGS);

// ─────────────────────────────────────────────────────────────────────────────
// The pixelation engine (extracted).
//
//   renderPixelatedText(dst, opts) paints a frame of text into `dst` canvas
//   with the requested pixelation level.
//
//   - `progress` 0..1 : 0 is maximally blocky, 1 is crisp
//   - `maxCell`       : starting block size in CSS px
//   - `minCell`       : terminal block size (1 = pixel-perfect)
//   - We cache the source text render keyed by its inputs so re-renders
//     during scrubbing don't redraw + re-sample the text every frame.
// ─────────────────────────────────────────────────────────────────────────────

let _srcCache = null; // { key, canvas, imgData }

function getSourceCanvas({
  text, font, weight, italic, size, color, letterSpacing, align,
  width, height, dpr,
}) {
  const key = [
    text, font, weight, italic, size, color, letterSpacing, align, width, height, dpr,
  ].join('|');
  if (_srcCache && _srcCache.key === key) return _srcCache;

  const canvas = document.createElement('canvas');
  canvas.width = Math.floor(width * dpr);
  canvas.height = Math.floor(height * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  const style = italic ? 'italic' : 'normal';
  ctx.font = `${style} ${weight} ${size}px ${font}`;

  // Manual letter-spacing pass.
  const chars = Array.from(text);
  const widths = chars.map(ch => ctx.measureText(ch).width);
  const trackPx = letterSpacing * size;
  let total = widths.reduce((a, b) => a + b, 0) + trackPx * Math.max(0, chars.length - 1);
  let x;
  if (align === 'center') x = width / 2 - total / 2;
  else if (align === 'right') x = width - total - 20;
  else x = 20;
  ctx.textAlign = 'left';
  const cy = height / 2;
  chars.forEach((ch, i) => {
    ctx.fillText(ch, x, cy);
    x += widths[i] + trackPx;
  });

  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  _srcCache = { key, canvas, imgData, w: canvas.width, h: canvas.height };
  return _srcCache;
}

function renderPixelatedFrame(dst, opts) {
  const {
    progress,
    maxCell = 56,
    minCell = 1,
    threshold = 0.08, // alpha cutoff below which we skip a cell
    width, height, dpr,
  } = opts;

  const src = getSourceCanvas({ ...opts, dpr });

  const ctx = dst.getContext('2d');
  dst.width = Math.floor(width * dpr);
  dst.height = Math.floor(height * dpr);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, dst.width, dst.height);
  ctx.scale(dpr, dpr);

  const p = Math.max(0, Math.min(1, progress));
  const ratio = Math.max(0.0001, minCell / maxCell);
  // Exponential falloff for natural-feeling shrink from blocky → crisp.
  const cellSize = Math.max(minCell, Math.round(maxCell * Math.pow(ratio, p)));

  if (cellSize <= 1 && p >= 0.995) {
    ctx.drawImage(src.canvas, 0, 0, width, height);
    return;
  }

  const imgData = src.imgData;
  const sw = src.w;
  const sh = src.h;
  const cellSrc = cellSize * dpr;
  ctx.imageSmoothingEnabled = false;

  for (let gy = 0; gy < height; gy += cellSize) {
    for (let gx = 0; gx < width; gx += cellSize) {
      const sx = Math.min(sw - 1, Math.floor((gx + cellSize / 2) * dpr));
      const sy = Math.min(sh - 1, Math.floor((gy + cellSize / 2) * dpr));
      const idx = (sy * sw + sx) * 4;
      if (imgData[idx + 3] < 12) continue;

      let rAcc = imgData[idx], gAcc = imgData[idx+1], bAcc = imgData[idx+2], aAcc = imgData[idx+3];
      let n = 1;
      if (cellSrc > 4) {
        const offs = [
          [-cellSrc/3, -cellSrc/3],
          [ cellSrc/3, -cellSrc/3],
          [-cellSrc/3,  cellSrc/3],
          [ cellSrc/3,  cellSrc/3],
        ];
        for (const [dx, dy] of offs) {
          const xx = Math.max(0, Math.min(sw-1, Math.floor(sx + dx)));
          const yy = Math.max(0, Math.min(sh-1, Math.floor(sy + dy)));
          const ii = (yy * sw + xx) * 4;
          rAcc += imgData[ii];
          gAcc += imgData[ii+1];
          bAcc += imgData[ii+2];
          aAcc += imgData[ii+3];
          n++;
        }
      }
      const rr = Math.round(rAcc / n);
      const gg = Math.round(gAcc / n);
      const bb = Math.round(bAcc / n);
      const aa = (aAcc / n) / 255;
      if (aa < threshold) continue;
      ctx.fillStyle = `rgba(${rr},${gg},${bb},${aa})`;
      ctx.fillRect(gx, gy, cellSize, cellSize);
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// React component wrapping the engine with an animation loop.
// ─────────────────────────────────────────────────────────────────────────────

function PixelatedTextCanvas({
  text, font, weight, italic, size, color, letterSpacing, align,
  maxCell, minCell, duration, easing,
  loop, hold, playToken,            // playToken increments to restart playback
  background,
  onProgress,
}) {
  const wrapperRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const startRef = React.useRef(null);

  // Size the canvas to its container, with proper DPR.
  const [dims, setDims] = React.useState({ w: 800, h: 400 });
  React.useEffect(() => {
    if (!wrapperRef.current) return;
    const measure = () => {
      const r = wrapperRef.current.getBoundingClientRect();
      // Leave a little padding inside the frame.
      setDims({
        w: Math.max(320, Math.floor(r.width - 32)),
        h: Math.max(200, Math.floor(r.height - 32)),
      });
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(wrapperRef.current);
    return () => ro.disconnect();
  }, []);

  // Clear cache when text params change.
  React.useEffect(() => { _srcCache = null; }, [text, font, weight, italic, size, color, letterSpacing, align, dims.w, dims.h]);

  // Animation loop.
  React.useEffect(() => {
    startRef.current = performance.now();
    const easeFn = EASINGS[easing] || EASINGS.easeOutCubic;
    const dpr = window.devicePixelRatio || 1;

    const loopFn = (now) => {
      const elapsed = (now - startRef.current) / 1000;
      let raw = duration > 0 ? elapsed / duration : 1;
      let done = false;
      if (raw >= 1) {
        raw = 1;
        if (loop) {
          // After `hold` seconds of being crisp, restart.
          if (elapsed >= duration + hold) {
            startRef.current = now;
            raw = 0;
          }
        } else {
          done = true;
        }
      }
      const progress = raw >= 1 ? 1 : easeFn(raw);
      if (canvasRef.current) {
        renderPixelatedFrame(canvasRef.current, {
          text, font, weight, italic, size, color, letterSpacing, align,
          progress, maxCell, minCell,
          width: dims.w, height: dims.h, dpr,
        });
      }
      if (onProgress) onProgress(raw, progress);
      if (!done) rafRef.current = requestAnimationFrame(loopFn);
    };

    rafRef.current = requestAnimationFrame(loopFn);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [
    text, font, weight, italic, size, color, letterSpacing, align,
    maxCell, minCell, duration, easing, loop, hold,
    dims.w, dims.h, playToken,
  ]);

  return (
    <div ref={wrapperRef} className="canvas-inner">
      <canvas
        ref={canvasRef}
        className="pixel-canvas"
        style={{ width: dims.w, height: dims.h, background }}
      />
    </div>
  );
}

async function loadGoogleFont(family) {
  const id = 'gf-' + family.replace(/\s+/g, '-');
  if (document.getElementById(id)) return;
  const link = document.createElement('link');
  link.id = id;
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@300;400;500;600;700;800&display=swap`;
  document.head.appendChild(link);
  try {
    await document.fonts.load(`400 120px "${family}"`);
    await document.fonts.load(`600 120px "${family}"`);
  } catch {}
}

async function loadUploadedFont(file) {
  // Derive a family name from the filename (sanitized).
  const base = file.name.replace(/\.[^.]+$/, '').replace(/[^\w\s-]/g, '').trim() || 'Custom Font';
  const buffer = await file.arrayBuffer();
  const face = new FontFace(base, buffer);
  await face.load();
  document.fonts.add(face);
  return base;
}

    setFontError(''); setFontLoading(true);

      setFontStack(added[0].value);

      await loadGoogleFont(family);

        <div className="canvas-frame" style={{ background }}>
          <PixelatedTextCanvas

            letterSpacing={letterSpacing}
            align={align}
            maxCell={maxCell}
            minCell={minCell}
            duration={duration}
            easing={easing}
            loop={loop}
            hold={hold}
            playToken={playToken}
            background={background}
            onProgress={(raw, p) => setRawProg(raw)}
          />
        </div>

        <div className="stage-actions">
          <button className="btn primary" onClick={replay}>
            <span className="dot" /> Replay

          <div className="progress-rail">

          <button

            title="Toggle loop"

        </div>
      </div>

      {/* ── Panel ─────────────────────────────────────────────── */}
      <aside className="panel">
        <div className="panel-brand">

          <div className="panel-brand-name">Siena · Playground</div>

        <h2 className="panel-title">Pixelated text</h2>
        <p className="panel-sub">

        {/* Content */}
        <div className="section">
          <div className="section-label">Content</div>

            className="text-input"

          <Chips

          />
          <Chips

          <Slider

          <Chips

        {/* Color */}

      {exportOpen && (
        <ExportModal
          onClose={() => setExportOpen(false)}

function ExportModal({ onClose, settings }) {

// Render one frame at the given progress into a fresh canvas and return the blob.
function renderStill(settings, { width, height, progress }) {
  const dpr = 2;
  const canvas = document.createElement('canvas');
  _srcCache = null; // force re-rasterize at this size
  renderPixelatedFrame(canvas, {
    text: settings.text || ' ',
    font: settings.fontStack,
    weight: settings.weight,
    italic: settings.italic,
    size: settings.size,
    color: settings.color,
    letterSpacing: settings.letterSpacing,
    align: settings.align,
    progress,
    maxCell: settings.maxCell,
    minCell: settings.minCell,
    width, height, dpr,
  });
  // Composite onto background for PNG export.
  const out = document.createElement('canvas');
  out.width = canvas.width;
  out.height = canvas.height;
  const octx = out.getContext('2d');
  octx.fillStyle = settings.background;
  octx.fillRect(0, 0, out.width, out.height);
  octx.drawImage(canvas, 0, 0);
  return out;
}

function ImageTab({ settings }) {
  const [resolution, setResolution] = React.useState('1920x1080');
  const [progress, setProgress] = React.useState(1);
  const [format, setFormat] = React.useState('png');

  const doExport = () => {
    const [w, h] = resolution.split('x').map(Number);
    const canvas = renderStill(settings, { width: w, height: h, progress });
    const mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pixelated-text.${format}`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, mime, 0.95);
  };

  return (
    <>
      <h3 className="modal-title">Export image</h3>
      <p className="modal-sub">Render a single still frame at any point in the reveal.</p>
      <div className="export-row">
        <div className="export-label">Format</div>
        <div className="export-control">
          <div className="seg">
            <button className={`seg-btn ${format === 'png' ? 'active' : ''}`} onClick={() => setFormat('png')}>PNG</button>
            <button className={`seg-btn ${format === 'jpg' ? 'active' : ''}`} onClick={() => setFormat('jpg')}>JPG</button>
          </div>
        </div>
      </div>
      <div className="export-row">
        <div className="export-label">Resolution</div>
        <div className="export-control">
          <select className="select-native" value={resolution} onChange={(e) => setResolution(e.target.value)}>
            <option value="1280x720">720p  1280 × 720</option>
            <option value="1920x1080">1080p  1920 × 1080</option>
            <option value="2560x1440">1440p  2560 × 1440</option>
            <option value="3840x2160">4K  3840 × 2160</option>
            <option value="1080x1080">Square  1080 × 1080</option>
            <option value="1080x1920">Vertical  1080 × 1920</option>
          </select>
        </div>
      </div>
      <div className="export-row">
        <div className="export-label">Frame</div>
        <div className="export-control" style={{ gap: 12, width: '100%', justifyContent: 'flex-end' }}>
          <input
            type="range" min={0} max={1} step={0.01}
            value={progress}
            onChange={(e) => setProgress(parseFloat(e.target.value))}
            style={{ maxWidth: 220 }}
          />
          <div style={{ fontFamily: 'ui-monospace, monospace', fontSize: 12, color: 'var(--text-dim)', width: 48, textAlign: 'right' }}>
            {Math.round(progress * 100)}%
          </div>
        </div>
      </div>
      <button className="big-btn" onClick={doExport}>Export {format.toUpperCase()}</button>
    </>
  );
}

function VideoTab({ settings }) {
  const [format, setFormat] = React.useState('webm');
  const [resolution, setResolution] = React.useState('1920x1080');
  const [fps, setFps] = React.useState(30);
  const [quality, setQuality] = React.useState('high');
  const [recording, setRecording] = React.useState(false);
  const [progress, setProgress] = React.useState(0);

  // We generate the video in real time by rendering frames into a canvas and
  // piping its stream through MediaRecorder. Total duration = reveal + hold.
  const doExport = async () => {
    const [w, h] = resolution.split('x').map(Number);
    const total = settings.duration + settings.hold;
    const easeFn = EASINGS[settings.easing] || EASINGS.easeOutCubic;
    const bitrates = { low: 2_000_000, med: 5_000_000, high: 10_000_000 };

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    // prime context so captureStream emits frames
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = settings.background;
    ctx.fillRect(0, 0, w, h);

    const stream = canvas.captureStream(fps);
    const mime = format === 'mp4'
      ? 'video/mp4;codecs=avc1'
      : 'video/webm;codecs=vp9';
    const useMime = MediaRecorder.isTypeSupported(mime) ? mime : 'video/webm';
    const rec = new MediaRecorder(stream, {
      mimeType: useMime,
      videoBitsPerSecond: bitrates[quality],
    });
    const chunks = [];
    rec.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };

    const done = new Promise((resolve) => { rec.onstop = resolve; });
    rec.start();
    setRecording(true);

    const startTs = performance.now();
    const step = () => {
      const elapsed = (performance.now() - startTs) / 1000;
      const raw = Math.min(1, elapsed / settings.duration);
      const p = raw >= 1 ? 1 : easeFn(raw);
      // background
      ctx.fillStyle = settings.background;
      ctx.fillRect(0, 0, w, h);
      // pixelated text atop
      const tmp = renderStill(
        { ...settings, background: 'transparent' },
        { width: w, height: h, progress: p }
      );
      // renderStill fills background too — just re-draw on our bg
      ctx.fillStyle = settings.background;
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(tmp, 0, 0, w, h);

      setProgress(Math.min(1, elapsed / total));
      if (elapsed < total) {
        requestAnimationFrame(step);
      } else {
        rec.stop();
      }
    };
    requestAnimationFrame(step);

    await done;
    setRecording(false);

    const blob = new Blob(chunks, { type: useMime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pixelated-text.${useMime.includes('mp4') ? 'mp4' : 'webm'}`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  };

  const [w, h] = resolution.split('x').map(Number);
  const totalDur = settings.duration + settings.hold;

  return (
    <>
      <h3 className="modal-title">Export video</h3>
      <p className="modal-sub">Records the reveal in real time using your browser's canvas stream. Duration = {totalDur.toFixed(1)}s (reveal + hold).</p>
      <div className="export-row">
        <div className="export-label">Format</div>
        <div className="export-control">
          <div className="seg">
            <button className={`seg-btn ${format === 'webm' ? 'active' : ''}`} onClick={() => setFormat('webm')}>WebM</button>
            <button className={`seg-btn ${format === 'mp4' ? 'active' : ''}`} onClick={() => setFormat('mp4')}>MP4</button>
          </div>
        </div>
      </div>
      <div className="export-row">
        <div className="export-label">Resolution</div>
        <div className="export-control">
          <select className="select-native" value={resolution} onChange={(e) => setResolution(e.target.value)}>
            <option value="1280x720">720p  1280 × 720</option>
            <option value="1920x1080">1080p  1920 × 1080</option>
            <option value="2560x1440">1440p  2560 × 1440</option>
            <option value="1080x1080">Square  1080 × 1080</option>
            <option value="1080x1920">Vertical  1080 × 1920</option>
          </select>
        </div>
      </div>
      <div className="export-row">
        <div className="export-label">Quality</div>
        <div className="export-control">
          <select className="select-native" value={quality} onChange={(e) => setQuality(e.target.value)}>
            <option value="low">Low  ~2 Mbps</option>
            <option value="med">Medium  ~5 Mbps</option>
            <option value="high">High  ~10 Mbps</option>
          </select>
        </div>
      </div>
      <div className="export-row">
        <div className="export-label">Frame rate</div>
        <div className="export-control">
          <select className="select-native" value={fps} onChange={(e) => setFps(parseInt(e.target.value))}>
            <option value={24}>24 fps</option>
            <option value={30}>30 fps</option>
            <option value={60}>60 fps</option>
          </select>
        </div>
      </div>
      <div className="export-row">
        <div className="export-label">Duration</div>
        <div className="export-control" style={{ color: 'var(--text-dim)', fontSize: 13 }}>
          {totalDur.toFixed(1)}s
        </div>
      </div>
      <button className="big-btn" onClick={doExport} disabled={recording}>
        {recording
          ? <><span className="recording-pulse" /> Recording… {Math.round(progress * 100)}%</>
          : <>Export {format.toUpperCase()}</>}
      </button>
    </>
  );
}

function EmbedTab({ settings }) {
  const [copied, setCopied] = React.useState('');
  const cfg = encodeURIComponent(JSON.stringify(settings));
  const htmlSnippet = `<div id="pixtext"></div>
<` + `script src="https://siena.cx/embed/pixelated-text.js"
        data-target="pixtext"
        data-config='${JSON.stringify(settings)}'></` + `script>`;
  const reactSnippet = `import { PixelatedText } from '@siena/pixelated-text';

<PixelatedText
  text={${JSON.stringify(settings.text)}}
  font=${JSON.stringify(settings.fontStack)}
  weight={${settings.weight}}
  size={${settings.size}}
  color=${JSON.stringify(settings.color)}
  background=${JSON.stringify(settings.background)}
  duration={${settings.duration}}
  easing=${JSON.stringify(settings.easing)}
  maxCell={${settings.maxCell}}
  minCell={${settings.minCell}}
/>`;
  const iframeSnippet = `<iframe src="https://siena.cx/embed/pixelated-text?c=${cfg}"
        width="800" height="300" frameborder="0"></iframe>`;

  const [kind, setKind] = React.useState('html');
  const snippet = kind === 'html' ? htmlSnippet : kind === 'react' ? reactSnippet : iframeSnippet;

  const copy = () => {
    navigator.clipboard.writeText(snippet);
    setCopied(kind);
    setTimeout(() => setCopied(''), 1600);
  };

  return (
    <>
      <h3 className="modal-title">Embed</h3>
      <p className="modal-sub">Drop this snippet into any page. Your current settings are baked in.</p>
      <div className="export-row">
        <div className="export-label">Type</div>
        <div className="export-control">
          <div className="seg">
            <button className={`seg-btn ${kind === 'html' ? 'active' : ''}`} onClick={() => setKind('html')}>HTML</button>
            <button className={`seg-btn ${kind === 'react' ? 'active' : ''}`} onClick={() => setKind('react')}>React</button>
            <button className={`seg-btn ${kind === 'iframe' ? 'active' : ''}`} onClick={() => setKind('iframe')}>iframe</button>
          </div>
        </div>
      </div>
      <div style={{ marginTop: 16 }}>
        <div className="code-block">{snippet}</div>
        <div className="copy-row">
          <button className="secondary-btn" onClick={copy}>
            {copied === kind ? '✓ Copied' : 'Copy snippet'}
          </button>
        </div>
      </div>
    </>
  );
}

function JsonTab({ settings }) {
  const [copied, setCopied] = React.useState(false);
  const json = JSON.stringify(settings, null, 2);
  const download = () => {
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pixelated-text.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  const copy = () => {
    navigator.clipboard.writeText(json);
    setCopied(true);
    setTimeout(() => setCopied(false), 1600);
  };
  return (
    <>
      <h3 className="modal-title">Project JSON</h3>
      <p className="modal-sub">Host the config yourself — feed this JSON into the Siena Pixelated Text JavaScript SDK to reproduce the exact effect.</p>
      <div className="code-block">{json}</div>
      <div className="copy-row">
        <button className="big-btn" style={{ flex: 1, marginTop: 0 }} onClick={download}>Download JSON</button>
        <button className="secondary-btn" style={{ marginTop: 0 }} onClick={copy}>
          {copied ? '✓ Copied' : 'Copy to clipboard'}
        </button>
      </div>
    </>
  );
}

</script>
